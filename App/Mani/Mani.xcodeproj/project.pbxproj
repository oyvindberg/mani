			name = "Fix libghostty bundle layout";
			outputFileListPaths = (
			);
			outputPaths = (
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "# Reshape libghostty.framework from shallow (iOS-style) to deep (macOS-style)\n# layout. Upstream libghostty-spm 1.x ships the macOS slice with a shallow\n# bundle, which Xcode 26+ rejects with: \"expected Versions/Current/Resources/\n# Info.plist since the platform does not use shallow bundles\".\nset -eu\nFW=\"$BUILT_PRODUCTS_DIR/$FRAMEWORKS_FOLDER_PATH/libghostty.framework\"\n[ -d \"$FW\" ] || { echo \"libghostty.framework not embedded — nothing to fix.\"; exit 0; }\n[ -d \"$FW/Versions\" ] && { echo \"libghostty.framework already deep-layout.\"; exit 0; }\nmkdir -p \"$FW/Versions/A/Resources\"\nfor item in libghostty Headers Modules; do\n  [ -e \"$FW/$item\" ] && mv \"$FW/$item\" \"$FW/Versions/A/\"\ndone\n[ -e \"$FW/Info.plist\" ] && mv \"$FW/Info.plist\" \"$FW/Versions/A/Resources/\"\nrm -rf \"$FW/_CodeSignature\"\n(cd \"$FW/Versions\" && ln -sf A Current)\ncd \"$FW\"\nfor item in libghostty Headers Modules; do\n  [ -e \"Versions/Current/$item\" ] && ln -sf \"Versions/Current/$item\" \"$item\"\ndone\nln -sf Versions/Current/Resources Resources\n# Re-sign so the validator sees a valid signature over the new layout.\nIDENT=\"${EXPANDED_CODE_SIGN_IDENTITY:-${CODE_SIGN_IDENTITY:--}}\"\ncodesign --force --sign \"$IDENT\" --timestamp=none \"$FW\"\n";
		};
/* End PBXShellScriptBuildPhase section */

